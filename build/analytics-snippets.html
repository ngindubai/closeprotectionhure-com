<!-- ============================================================
     ANALYTICS & SEARCH CONSOLE SNIPPETS
     Deploy instructions for security-bodyguard site
     ============================================================ -->

<!--
  INSTRUCTIONS:
  1. Replace [GA_MEASUREMENT_ID] with your Google Analytics 4 measurement ID (format: G-XXXXXXXXXX)
  2. Replace [GSC_VERIFICATION_CODE] with your Google Search Console verification code
  3. Insert both snippets into the <head> section of every page, immediately after <meta charset="UTF-8">
  4. The GA snippet should load before any other scripts
  5. Test with Google Tag Assistant browser extension after deployment
-->


<!-- ==================== GOOGLE ANALYTICS 4 ==================== -->
<!-- Place immediately after <meta charset="UTF-8"> in <head> -->

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=[GA_MEASUREMENT_ID]"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '[GA_MEASUREMENT_ID]', {
    'anonymize_ip': true,
    'cookie_flags': 'SameSite=None;Secure'
  });
</script>


<!-- ==================== GOOGLE SEARCH CONSOLE ==================== -->
<!-- Place in <head> section -->

<meta name="google-site-verification" content="[GSC_VERIFICATION_CODE]">
