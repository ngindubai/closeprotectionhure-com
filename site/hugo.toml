# Security & Bodyguard — Hugo Configuration

baseURL = "https://closeprotectionhire.com/"
languageCode = "en"
title = "Close Protection and Security Services | CloseProtectionHire.com"

enableRobotsTXT = true
enableGitInfo = false
timeout = "120s"

[taxonomies]

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[pagination]
  pagerSize = 20

[permalinks]
  [permalinks.page]
    services = "/services/:slug/"
    cities = "/cities/:slug/"
    countries = "/countries/:slug/"
    blog = "/blog/:slug/"
    guides = "/guides/:slug/"
    "event-security" = "/event-security/:slug/"
    "risk-assessments" = "/risk-assessments/:slug/"

[params]
  brand = "CloseProtectionHire.com"
  tagline = "Close Protection and Executive Security"
  description = "Vetted close protection officers, executive security, and secure transport in high-risk cities. Licensed operators, background-checked, locally experienced."
  quoteFormEndpoint = ""
  googleSearchConsole = ""
  contactEmail = ""
  # GA4 measurement ID — add real ID (format G-XXXXXXXXXX) to activate analytics on the live site.
  # Used by baseof.html, guarded by `not hugo.IsServer` so never fires locally.
  googleAnalyticsId = ""

  [params.colors]
    primary = "#0a1628"
    accent = "#c8a45e"
    background = "#ffffff"
    surface = "#f0f4f8"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "github"

[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]
